      30% { opacity: 1; }

  </style>

        item.className = 'message ' + (msg.user === username ? 'own' : 'other');
        const time = new Date(msg.time).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        let html = `<div class="msg-user">${escapeHtml(msg.user)}</div><div class="msg-text">${escapeHtml(msg.text || '')}</div>`;
        if (msg.image) html += `<img src="${msg.image}" class="msg-img" onclick="window.open(this.src)">`;
        html += `<div class="msg-time">${time}</div>`;
        item.innerHTML = html;
      }
      messages.appendChild(item);
      messages.scrollTop = messages.scrollHeight;
    }

    socket.on('message', (msg) => {
      const curRoom = rooms.find(r => r.id === room);
      if (curRoom && curRoom.mediaOnly) {
        if (msg.image) addVidItem(msg.image, msg.user);
        return;
      }
      renderMessage(msg);
    });

    function addVidItem(url, user) {
      const grid = document.getElementById('videos-grid');
      if (nsfwVideos.find(v => v.url === url)) return;
      nsfwVideos.push({ url, user });
      const div = document.createElement('div');
      div.className = 'vid-item';
      const isVideo = url.includes('mp4') || url.includes('webm');
      div.innerHTML = isVideo ? `<video src="${url}" autoplay loop muted></video><div class="vid-user">${user}</div>` : `<img src="${url}" loading="lazy"><div class="vid-user">${user}</div>`;
      div.addEventListener('click', () => window.open(url, '_blank'));
      grid.insertBefore(div, grid.firstChild);
    }

    socket.on('cumshot', (data) => {
      const target = document.querySelector(`[data-msgid="${data.msgId}"]`);
      if (target) cumshot(target, data.msgId);
    });

    socket.on('users-count', (count) => {
      usersOnline.textContent = count + ' онлайн';
    });

    function escapeHtml(text) {
      const d = document.createElement('div');
      d.textContent = text;
      return d.innerHTML;
    }

    function createMilkSplashes() {
      for (let i = 0; i < 20; i++) {
        const splash = document.createElement('div');
        splash.className = 'milk-splash';
        const size = 40 + Math.random() * 200;
        splash.style.width = size + 'px';
        splash.style.height = size * (0.4 + Math.random() * 0.6) + 'px';
        splash.style.left = Math.random() * 100 + '%';
        splash.style.top = Math.random() * 100 + '%';
        splash.style.transform = 'rotate(' + (Math.random() * 360) + 'deg)';
        milkLayer.appendChild(splash);
      }
      for (let i = 0; i < 15; i++) {
        const stain = document.createElement('div');
        stain.className = 'milk-stain';
        const w = 30 + Math.random() * 120;
        const h = w * (0.3 + Math.random() * 0.7);
        stain.style.width = w + 'px';
        stain.style.height = h + 'px';
        stain.style.left = Math.random() * 100 + '%';
        stain.style.top = Math.random() * 100 + '%';
        stain.style.setProperty('--r', Math.random() * 360 + 'deg');
        milkLayer.appendChild(stain);
      }
      for (let i = 0; i < 8; i++) {
        const drip = document.createElement('div');
        drip.className = 'milk-drip';
        drip.style.left = Math.random() * 100 + '%';
        drip.style.animationDuration = (3 + Math.random() * 3) + 's';
        drip.style.animationDelay = (Math.random() * 5) + 's';
        drip.style.height = (12 + Math.random() * 20) + 'px';
        milkLayer.appendChild(drip);
      }
      for (let i = 0; i < 12; i++) {
        const drop = document.createElement('div');
        drop.className = 'milk-drop';
        drop.style.left = Math.random() * 100 + '%';
        drop.style.width = drop.style.height = (3 + Math.random() * 5) + 'px';
        drop.style.animationDuration = (6 + Math.random() * 6) + 's';
        drop.style.animationDelay = (Math.random() * 8) + 's';
        milkLayer.appendChild(drop);
      }
    }
    createMilkSplashes();

    const canvas = document.getElementById('fly-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const dongs = [];

    function createDong() {
      return {
        x: Math.random() * canvas.width,
        y: canvas.height + 60,
        w: 18 + Math.random() * 20,
        h: 50 + Math.random() * 60,
        speed: 0.3 + Math.random() * 0.8,
        swing: Math.random() * Math.PI * 2,
        swingSpeed: 0.02 + Math.random() * 0.03,
        color: `hsla(${Math.random() * 30 + 340}, 70%, ${50 + Math.random() * 30}%, 0.7)`,
        tilt: (Math.random() - 0.5) * 0.6,
        left: Math.random() > 0.5
      };
    }

    for (let i = 0; i < 14; i++) {
      const d = createDong();
      d.y = Math.random() * canvas.height;
      dongs.push(d);
    }

    function drawDong(d) {
      ctx.save();
      ctx.translate(d.x, d.y);
      ctx.rotate(d.tilt + Math.sin(d.swing) * 0.2);
      if (d.left) ctx.scale(-1, 1);
      ctx.fillStyle = d.color;
      ctx.strokeStyle = 'rgba(0,0,0,0.2)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(-d.w/3, -d.h);
      ctx.quadraticCurveTo(d.w/2, -d.h, d.w/3, -d.h * 0.6);
      ctx.quadraticCurveTo(d.w/2, -d.h * 0.4, d.w/3, -d.h * 0.3);
      ctx.quadraticCurveTo(d.w/2, -d.h * 0.1, d.w/3, 0);
      ctx.lineTo(-d.w/3, 0);
      ctx.quadraticCurveTo(-d.w/2, -d.h * 0.1, -d.w/3, -d.h * 0.3);
      ctx.quadraticCurveTo(-d.w/2, -d.h * 0.4, -d.w/3, -d.h * 0.6);
      ctx.quadraticCurveTo(-d.w/2, -d.h, -d.w/3, -d.h);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(0, -d.h, d.w/4, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.beginPath();
      ctx.ellipse(-d.w/6, -d.h * 0.5, d.w/8, d.h/6, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      dongs.forEach(d => {
        d.y -= d.speed;
        d.swing += d.swingSpeed;
        if (d.y < -120) {
          Object.assign(d, createDong());
          d.y = canvas.height + 60;
        }
        drawDong(d);
      });
      requestAnimationFrame(animate);
    }
    animate();

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });

    const callBtn = document.getElementById('call-btn');
    const callNotif = document.getElementById('call-notification');
    const callNotifText = document.getElementById('call-notif-text');
    const callJoinBtn = document.getElementById('call-join-btn');
    const callDeclineBtn = document.getElementById('call-decline-btn');

    let callState = 'idle';
    let localStream = null;
    let pc = null;
    let peerUsername = null;
    let callTimer = null;
    let callSeconds = 0;
    let pendingCandidates = [];

    callBtn.addEventListener('click', async () => {
      if (callState === 'idle') {
        try {
          localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
          callState = 'active';
          callBtn.textContent = '🔴 Завершить';
          callBtn.className = 'btn-call active';
          socket.emit('call-start');
          startCallTimer();
        } catch(e) {
          alert('❌ Нужен доступ к микрофону! Разреши в браузере.');
        }
      } else {
        endCall();
      }
    });

    callJoinBtn.addEventListener('click', async () => {
      try {
        localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
      } catch(e) { alert('❌ Нужен доступ к микрофону!'); return; }
      callNotif.classList.add('hidden');
      socket.emit('call-join', { callerUsername: peerUsername });
      initPC(true);
      callState = 'joined';
      callBtn.textContent = '🔊 В звонке';
      callBtn.className = 'btn-call joined';
      startCallTimer();
    });

    callDeclineBtn.addEventListener('click', () => {
      callNotif.classList.add('hidden');
      peerUsername = null;
    });

    socket.on('call-started', (data) => {
      if (data.username === username) return;
      peerUsername = data.username;
      callNotifText.textContent = `📞 Звонок от ${data.username}`;
      callNotif.classList.remove('hidden');
    });

    socket.on('call-ended', (data) => {
      if (data && data.username === username) return;
      callNotif.classList.add('hidden');
      if (callState !== 'idle') {
        endCall();
      }
    });

    socket.on('call-joined', async (data) => {
      if (data.username === username) return;
      if (callState === 'active' && data.callerUsername === username) {
        peerUsername = data.username;
        initPC(false);
      }
    });

    socket.on('call-signal', async (data) => {
      if (!pc) {
        if (data.signal.candidate) {
          pendingCandidates.push(data.signal);
        }
        return;
      }
      try {
        if (data.signal.type === 'offer') {
          if (pc.signalingState !== 'stable') return;
          await pc.setRemoteDescription(new RTCSessionDescription(data.signal));
          const answer = await pc.createAnswer();
          await pc.setLocalDescription(answer);
          socket.emit('call-signal', { signal: answer, toUser: data.fromUser });
          while (pendingCandidates.length) {
            await pc.addIceCandidate(new RTCIceCandidate(pendingCandidates.shift())).catch(() => {});
          }
        } else if (data.signal.type === 'answer') {
          if (pc.signalingState !== 'have-local-offer') return;
          await pc.setRemoteDescription(new RTCSessionDescription(data.signal));
          while (pendingCandidates.length) {
            await pc.addIceCandidate(new RTCIceCandidate(pendingCandidates.shift())).catch(() => {});
          }
        } else if (data.signal.candidate) {
          if (pc.remoteDescription) {
            await pc.addIceCandidate(new RTCIceCandidate(data.signal));
          } else {
            pendingCandidates.push(data.signal);
          }
        }
      } catch(e) {}
    });

    function initPC(isAnswerer) {
      if (pc) { pc.close(); pc = null; }
      pendingCandidates = [];
      pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });

      if (localStream) localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

      pc.onicecandidate = (e) => {
        if (e.candidate && peerUsername) {
          socket.emit('call-signal', { signal: e.candidate, toUser: peerUsername });
        }
      };

      pc.oniceconnectionstatechange = () => {
        if (pc.iceConnectionState === 'disconnected' || pc.iceConnectionState === 'failed') {
          if (callState !== 'idle') endCall();
        }
      };

      pc.ontrack = (e) => {
        const audio = document.createElement('audio');
        audio.srcObject = e.streams[0];
        audio.autoplay = true;
        audio.volume = 1;
        audio.style.display = 'none';
        document.body.appendChild(audio);
      };

      if (!isAnswerer) {
        setTimeout(() => {
          if (pc) {
            pc.createOffer().then(offer => {
              return pc.setLocalDescription(offer);
            }).then(() => {
              socket.emit('call-signal', { signal: pc.localDescription, toUser: peerUsername });
            }).catch(() => {});
          }
        }, 500);
      }
    }

    function endCall() {
      if (pc) { pc.close(); pc = null; }
      if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
      callState = 'idle';
      peerUsername = null;
      pendingCandidates = [];
      callBtn.textContent = '🎤 Звонок';
      callBtn.className = 'btn-call idle';
      stopCallTimer();
      socket.emit('call-end');
      document.querySelectorAll('audio').forEach(a => a.remove());
    }

    function startCallTimer() {
      callSeconds = 0;
      callTimer = setInterval(() => {
        callSeconds++;
        const m = String(Math.floor(callSeconds / 60)).padStart(2, '0');
        const s = String(callSeconds % 60).padStart(2, '0');
        if (callState === 'active') callBtn.textContent = `🔴 ${m}:${s}`;
        else if (callState === 'joined') callBtn.textContent = `🔊 ${m}:${s}`;
      }, 1000);
    }

    function stopCallTimer() {
      clearInterval(callTimer);
      callTimer = null;
    }
  </script>
</body>
</html>
