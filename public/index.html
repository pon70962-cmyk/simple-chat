<!DOCTYPE html>
<html>
<head>
  <title>Чат-приложение</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #f0f0f0; }
    #messages { height: 300px; overflow-y: scroll; background: white; padding: 10px; margin-bottom: 10px; border-radius: 5px; }
    .message { margin: 5px 0; padding: 8px; border-radius: 3px; }
    .own { background: #dcf8c6; margin-left: 20%; }
    .other { background: #ffffff; margin-right: 20%; }
    #form { display: flex; }
    #input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 3px; }
    #button { padding: 10px 20px; background: #25d366; color: white; border: none; border-radius: 3px; cursor: pointer; }
  </style>
</head>
<body>
  <div id="messages"></div>
  <form id="form" autocomplete="off">
    <input id="input" autocomplete="off" placeholder="Напишите сообщение..." /><button id="button">Отправить</button>
  </form>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const form = document.getElementById('form');
    const input = document.getElementById('input');
    const messages = document.getElementById('messages');

    let username = prompt("Как вас зовут?") || "Аноним";
    let room = "general";

    socket.emit('joinRoom', { username, room });

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      if (input.value) {
        socket.emit('sendMessage', { message: input.value });
        input.value = '';
      }
    });

    socket.on('message', (msg) => {
      const item = document.createElement('div');
      item.textContent = `${msg.user}: ${msg.text}`;
      item.className = `message ${msg.user === username ? 'own' : 'other'}`;
      messages.appendChild(item);
      messages.scrollTop = messages.scrollHeight;
    });
  </script>
</body>
</html>
