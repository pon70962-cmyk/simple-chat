<!DOCTYPE html>
<html>
<head>
  <title>NSFW Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #0d0d0d; color: #fff; height: 100vh; display: flex; flex-direction: column; }

    .header { background: #1a1a2e; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #ff2d55; }
    .header h1 { font-size: 20px; background: linear-gradient(45deg, #ff2d55, #ff6b6b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .header .room-badge { background: #ff2d55; padding: 4px 12px; border-radius: 12px; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
    .header .users-online { color: #888; font-size: 13px; }

    .chat-container { flex: 1; display: flex; max-width: 900px; margin: 0 auto; width: 100%; }

    .sidebar { width: 200px; background: #111; padding: 16px 0; border-right: 1px solid #222; overflow-y: auto; }
    .sidebar-title { padding: 8px 16px; font-size: 11px; text-transform: uppercase; color: #666; letter-spacing: 1px; margin-bottom: 4px; }
    .room-item { padding: 10px 16px; cursor: pointer; font-size: 14px; color: #aaa; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
    .room-item:hover { background: #1a1a2e; color: #fff; }
    .room-item.active { background: #1a1a2e; color: #fff; border-left: 3px solid #ff2d55; }
    .room-item .nsfw-badge { font-size: 9px; background: #ff2d55; color: #fff; padding: 1px 6px; border-radius: 8px; margin-left: auto; }

    .main { flex: 1; display: flex; flex-direction: column; }

    #messages { flex: 1; overflow-y: auto; padding: 16px 20px; background: #0d0d0d; }
    .message { margin-bottom: 12px; padding: 10px 14px; border-radius: 8px; max-width: 75%; word-wrap: break-word; }
    .own { background: #1a1a2e; margin-left: auto; border-bottom-right-radius: 2px; }
    .other { background: #1e1e1e; margin-right: auto; border-bottom-left-radius: 2px; }
    .system { text-align: center; color: #666; font-size: 12px; margin: 8px 0; }
    .msg-user { font-size: 12px; font-weight: 700; color: #ff2d55; margin-bottom: 4px; }
    .own .msg-user { color: #ff6b6b; }
    .msg-text { font-size: 14px; line-height: 1.4; }
    .msg-time { font-size: 10px; color: #555; margin-top: 4px; text-align: right; }
    .msg-img { max-width: 100%; border-radius: 6px; margin-top: 6px; cursor: pointer; }

    .input-area { background: #111; padding: 12px 20px; border-top: 1px solid #222; }
    #form { display: flex; gap: 8px; align-items: center; }
    #input { flex: 1; padding: 12px 16px; background: #1e1e1e; border: none; border-radius: 8px; color: #fff; font-size: 14px; outline: none; }
    #input:focus { border: 1px solid #ff2d55; }
    .btn-group { display: flex; gap: 6px; }
    .btn { padding: 10px 16px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; transition: 0.2s; }
    .btn-send { background: #ff2d55; color: #fff; }
    .btn-send:hover { background: #e6264a; }
    .btn-img { background: #2a2a2a; color: #aaa; font-size: 18px; padding: 10px 14px; }
    .btn-img:hover { background: #3a3a3a; }

    canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.25; }
    .header, .chat-container, .input-area { position: relative; z-index: 1; }

    .auth-screen { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .auth-box { background: #1a1a2e; padding: 40px; border-radius: 16px; text-align: center; border: 1px solid #ff2d55; max-width: 360px; width: 90%; }
    .auth-box h2 { margin-bottom: 8px; background: linear-gradient(45deg, #ff2d55, #ff6b6b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .auth-box p { color: #888; font-size: 13px; margin-bottom: 20px; }
    .auth-box input { width: 100%; padding: 12px; background: #0d0d0d; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 14px; margin-bottom: 12px; outline: none; }
    .auth-box input:focus { border-color: #ff2d55; }
    .auth-box .btn { width: 100%; margin-top: 4px; }

    .hidden { display: none !important; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
  </style>
</head>
<body>
  <canvas id="fly-canvas"></canvas>

  <div class="auth-screen" id="auth-screen">
    <div class="auth-box">
      <h2>NSFW Chat</h2>
      <p>Вам есть 18+ лет? Введите никнейм чтобы войти</p>
      <input id="auth-input" placeholder="Ваш никнейм" maxlength="20" autofocus>
      <button class="btn btn-send" id="auth-btn" style="width:100%">Войти в чат</button>
    </div>
  </div>

  <div class="header">
    <div>
      <h1>NSFW Chat</h1>
      <div class="users-online" id="users-online">0 онлайн</div>
    </div>
    <div class="room-badge" id="current-room"># general</div>
  </div>

  <div class="chat-container">
    <div class="sidebar">
      <div class="sidebar-title">Комнаты</div>
      <div id="room-list"></div>
    </div>

    <div class="main">
      <div id="messages"></div>

      <div class="input-area">
        <form id="form" autocomplete="off">
          <input id="input" autocomplete="off" placeholder="Написать сообщение..." />
          <div class="btn-group">
            <button type="button" class="btn btn-img" id="img-btn" title="Отправить изображение">🖼</button>
            <button type="submit" class="btn btn-send">Отправить</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <input type="file" id="file-input" accept="image/*" style="display:none">

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const form = document.getElementById('form');
    const input = document.getElementById('input');
    const messages = document.getElementById('messages');
    const authScreen = document.getElementById('auth-screen');
    const authInput = document.getElementById('auth-input');
    const authBtn = document.getElementById('auth-btn');
    const fileInput = document.getElementById('file-input');
    const imgBtn = document.getElementById('img-btn');
    const usersOnline = document.getElementById('users-online');
    const currentRoom = document.getElementById('current-room');
    const roomList = document.getElementById('room-list');

    let username = '';
    let room = 'general';

    const rooms = [
      { id: 'general', name: 'Общий чат', nsfw: false },
      { id: 'nsfw', name: 'NSFW', nsfw: true },
      { id: 'nsfw-hard', name: 'NSFW Hard', nsfw: true },
      { id: 'random', name: 'Random', nsfw: false }
    ];

    function renderRooms() {
      roomList.innerHTML = '';
      rooms.forEach(r => {
        const div = document.createElement('div');
        div.className = 'room-item' + (r.id === room ? ' active' : '');
        div.innerHTML = `<span># ${r.name}</span>${r.nsfw ? '<span class="nsfw-badge">18+</span>' : ''}`;
        div.addEventListener('click', () => {
          if (username) {
            socket.emit('leaveRoom', { room });
            room = r.id;
            socket.emit('joinRoom', { username, room });
            messages.innerHTML = '';
            currentRoom.textContent = '# ' + r.name;
            renderRooms();
          }
        });
        roomList.appendChild(div);
      });
    }
    renderRooms();

    authBtn.addEventListener('click', enterChat);
    authInput.addEventListener('keydown', e => { if (e.key === 'Enter') enterChat(); });

    function enterChat() {
      const name = authInput.value.trim();
      if (!name || name.length < 2) return;
      username = name;
      authScreen.classList.add('hidden');
      socket.emit('joinRoom', { username, room });
    }

    function sendMessage(text, img) {
      if (!text && !img) return;
      socket.emit('sendMessage', { message: text, image: img });
      input.value = '';
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      if (input.value.trim()) sendMessage(input.value.trim());
    });

    imgBtn.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', () => {
      const file = fileInput.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        sendMessage('', e.target.result);
      };
      reader.readAsDataURL(file);
      fileInput.value = '';
    });

    socket.on('message', (msg) => {
      const item = document.createElement('div');
      if (msg.type === 'system') {
        item.className = 'system';
        item.textContent = msg.text;
      } else {
        item.className = 'message ' + (msg.user === username ? 'own' : 'other');
        const time = new Date(msg.time).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        let html = `<div class="msg-user">${msg.user}</div><div class="msg-text">${escapeHtml(msg.text || '')}</div>`;
        if (msg.image) html += `<img src="${msg.image}" class="msg-img" onclick="window.open(this.src)">`;
        html += `<div class="msg-time">${time}</div>`;
        item.innerHTML = html;
      }
      messages.appendChild(item);
      messages.scrollTop = messages.scrollHeight;
    });

    socket.on('users-count', (count) => {
      usersOnline.textContent = count + ' онлайн';
    });

    function escapeHtml(text) {
      const d = document.createElement('div');
      d.textContent = text;
      return d.innerHTML;
    }

    const canvas = document.getElementById('fly-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const dongs = [];

    function createDong() {
      return {
        x: Math.random() * canvas.width,
        y: canvas.height + 60,
        w: 18 + Math.random() * 20,
        h: 50 + Math.random() * 60,
        speed: 0.3 + Math.random() * 0.8,
        swing: Math.random() * Math.PI * 2,
        swingSpeed: 0.02 + Math.random() * 0.03,
        color: `hsla(${Math.random() * 30 + 340}, 70%, ${50 + Math.random() * 30}%, 0.7)`,
        tilt: (Math.random() - 0.5) * 0.6,
        left: Math.random() > 0.5
      };
    }

    for (let i = 0; i < 14; i++) {
      const d = createDong();
      d.y = Math.random() * canvas.height;
      dongs.push(d);
    }

    function drawDong(d) {
      ctx.save();
      ctx.translate(d.x, d.y);
      ctx.rotate(d.tilt + Math.sin(d.swing) * 0.2);

      if (d.left) ctx.scale(-1, 1);

      ctx.fillStyle = d.color;
      ctx.strokeStyle = 'rgba(0,0,0,0.2)';
      ctx.lineWidth = 2;

      ctx.beginPath();
      ctx.moveTo(-d.w/3, -d.h);
      ctx.quadraticCurveTo(d.w/2, -d.h, d.w/3, -d.h * 0.6);
      ctx.quadraticCurveTo(d.w/2, -d.h * 0.4, d.w/3, -d.h * 0.3);
      ctx.quadraticCurveTo(d.w/2, -d.h * 0.1, d.w/3, 0);
      ctx.lineTo(-d.w/3, 0);
      ctx.quadraticCurveTo(-d.w/2, -d.h * 0.1, -d.w/3, -d.h * 0.3);
      ctx.quadraticCurveTo(-d.w/2, -d.h * 0.4, -d.w/3, -d.h * 0.6);
      ctx.quadraticCurveTo(-d.w/2, -d.h, -d.w/3, -d.h);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(0, -d.h, d.w/4, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();

      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.beginPath();
      ctx.ellipse(-d.w/6, -d.h * 0.5, d.w/8, d.h/6, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      dongs.forEach(d => {
        d.y -= d.speed;
        d.swing += d.swingSpeed;

        if (d.y < -120) {
          Object.assign(d, createDong());
          d.y = canvas.height + 60;
        }

        drawDong(d);
      });

      requestAnimationFrame(animate);
    }

    animate();

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });
  </script>
</body>
</html>
