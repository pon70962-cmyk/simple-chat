<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #1a1a1a; height: 100vh; display: flex; flex-direction: column; }

    .auth { position: fixed; inset: 0; background: #fff; display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .auth-box { width: 340px; padding: 32px; }
    .auth-box h1 { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
    .auth-box p { color: #666; font-size: 14px; margin-bottom: 24px; }
    .auth-box input { width: 100%; padding: 12px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; margin-bottom: 10px; outline: none; font-family: inherit; }
    .auth-box input:focus { border-color: #007aff; }
    .auth-box .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; }
    .auth-box .btn-primary { background: #007aff; color: #fff; }
    .auth-box .btn-primary:hover { background: #0062cc; }
    .auth-box .link { color: #007aff; font-size: 14px; cursor: pointer; margin-top: 12px; display: inline-block; }
    .auth-box .link:hover { text-decoration: underline; }
    .auth-box .err { color: #ff3b30; font-size: 13px; margin-top: 8px; }

    .layout { display: flex; flex: 1; min-height: 0; }
    .sidebar { width: 280px; background: #fff; border-right: 1px solid #e5e5e5; display: flex; flex-direction: column; flex-shrink: 0; }
    .sidebar-header { padding: 16px 16px 12px; font-size: 18px; font-weight: 700; border-bottom: 1px solid #e5e5e5; display: flex; align-items: center; justify-content: space-between; }
    .sidebar-header .online { font-size: 12px; font-weight: 400; color: #666; }
    .search-box { padding: 8px 12px; }
    .search-box input { width: 100%; padding: 8px 12px; border: none; background: #f0f0f0; border-radius: 8px; font-size: 14px; outline: none; font-family: inherit; }
    .dm-list { flex: 1; overflow-y: auto; }
    .dm-item { padding: 10px 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: 0.1s; }
    .dm-item:hover { background: #f0f0f0; }
    .dm-item.active { background: #e8f0fe; }
    .dm-item .avatar { width: 36px; height: 36px; border-radius: 50%; background: #007aff; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; flex-shrink: 0; }
    .dm-item .info { flex: 1; min-width: 0; }
    .dm-item .info .name { font-size: 15px; font-weight: 500; }
    .dm-item .info .preview { font-size: 13px; color: #999; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .dm-item .dot { width: 8px; height: 8px; border-radius: 50%; background: #34c759; flex-shrink: 0; }

    .main { flex: 1; display: flex; flex-direction: column; background: #fff; min-width: 0; }
    .chat-header { padding: 12px 20px; border-bottom: 1px solid #e5e5e5; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .chat-header .avatar { width: 34px; height: 34px; border-radius: 50%; background: #007aff; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; flex-shrink: 0; }
    .chat-header .info .name { font-size: 16px; font-weight: 600; }
    .chat-header .info .status { font-size: 12px; color: #34c759; }

    #msgs { flex: 1; overflow-y: auto; padding: 16px 20px; background: #fafafa; }
    .msg { margin-bottom: 14px; max-width: 70%; }
    .msg.own { margin-left: auto; }
    .msg.own .bubble { background: #007aff; color: #fff; border-bottom-right-radius: 4px; }
    .msg .bubble { background: #fff; padding: 10px 14px; border-radius: 12px; box-shadow: 0 1px 2px rgba(0,0,0,0.06); word-wrap: break-word; border-bottom-left-radius: 4px; }
    .msg .bubble .text { font-size: 15px; line-height: 1.4; }
    .msg .bubble .file { display: block; max-width: 280px; max-height: 280px; border-radius: 8px; margin-top: 4px; cursor: pointer; }
    .msg .meta { font-size: 11px; color: #999; margin-top: 4px; padding: 0 4px; }
    .msg.own .meta { text-align: right; }
    .msg .bubble .file-link { display: inline-flex; align-items: center; gap: 6px; background: #f0f0f0; padding: 6px 12px; border-radius: 6px; font-size: 13px; color: #007aff; text-decoration: none; margin-top: 4px; }
    .sys { text-align: center; color: #999; font-size: 12px; padding: 8px 0; }

    .input-area { padding: 12px 16px; border-top: 1px solid #e5e5e5; background: #fff; flex-shrink: 0; }
    .input-row { display: flex; gap: 8px; align-items: flex-end; }
    .input-row input[type="text"] { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 20px; font-size: 15px; outline: none; font-family: inherit; }
    .input-row input[type="text"]:focus { border-color: #007aff; }
    .input-row button { padding: 10px 18px; border: none; border-radius: 20px; background: #007aff; color: #fff; font-size: 15px; cursor: pointer; font-weight: 600; font-family: inherit; white-space: nowrap; }
    .input-row button:hover { background: #0062cc; }
    .input-row .file-btn { background: transparent; color: #666; font-size: 20px; padding: 8px 12px; cursor: pointer; border: none; border-radius: 50%; }
    .input-row .file-btn:hover { background: #f0f0f0; }

    .hidden { display: none !important; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }
  </style>
</head>
<body>

  <div class="auth" id="auth">
    <div class="auth-box" id="auth-login">
      <h1>Chat</h1>
      <p>Войдите или создайте аккаунт</p>
      <input id="login-user" placeholder="Имя пользователя" autofocus>
      <input id="login-pass" type="password" placeholder="Пароль">
      <button class="btn btn-primary" id="login-btn">Войти</button>
      <div class="err" id="login-err"></div>
      <a class="link" id="show-reg">Нет аккаунта? Зарегистрироваться</a>
    </div>
    <div class="auth-box hidden" id="auth-reg">
      <h1>Регистрация</h1>
      <p>Создайте аккаунт</p>
      <input id="reg-user" placeholder="Имя пользователя">
      <input id="reg-pass" type="password" placeholder="Пароль">
      <button class="btn btn-primary" id="reg-btn">Зарегистрироваться</button>
      <div class="err" id="reg-err"></div>
      <a class="link" id="show-login">Уже есть аккаунт? Войти</a>
    </div>
  </div>

  <div class="layout">
    <div class="sidebar">
      <div class="sidebar-header">
        <span>Chat</span>
        <span class="online" id="online-count">—</span>
      </div>
      <div class="search-box"><input id="search" placeholder="Поиск..."></div>
      <div class="dm-list" id="dm-list"></div>
    </div>

    <div class="main">
      <div class="chat-header" id="chat-header">
        <div class="avatar" id="chat-avatar">G</div>
        <div class="info">
          <div class="name" id="chat-name">Общий чат</div>
          <div class="status" id="chat-status">онлайн</div>
        </div>
      </div>
      <div id="msgs"></div>
      <div class="input-area">
        <div class="input-row">
          <button class="file-btn" id="file-btn">📎</button>
          <input type="text" id="input" placeholder="Сообщение..." autofocus>
          <button id="send-btn">Отправить</button>
        </div>
      </div>
    </div>
  </div>

  <input type="file" id="file-input" style="display:none">

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let username = '';
    let currentRoom = 'general';
    let currentDm = null;

    const auth = document.getElementById('auth');
    const authLogin = document.getElementById('auth-login');
    const authReg = document.getElementById('auth-reg');
    const loginUser = document.getElementById('login-user');
    const loginPass = document.getElementById('login-pass');
    const loginBtn = document.getElementById('login-btn');
    const loginErr = document.getElementById('login-err');
    const regUser = document.getElementById('reg-user');
    const regPass = document.getElementById('reg-pass');
    const regBtn = document.getElementById('reg-btn');
    const regErr = document.getElementById('reg-err');
    const showReg = document.getElementById('show-reg');
    const showLogin = document.getElementById('show-login');
    const dmList = document.getElementById('dm-list');
    const search = document.getElementById('search');
    const msgs = document.getElementById('msgs');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send-btn');
    const fileBtn = document.getElementById('file-btn');
    const fileInput = document.getElementById('file-input');
    const onlineCount = document.getElementById('online-count');
    const chatName = document.getElementById('chat-name');
    const chatStatus = document.getElementById('chat-status');
    const chatAvatar = document.getElementById('chat-avatar');

    let users = [];
    let dmCache = {};

    function getAvatar(name) { return name ? name.charAt(0).toUpperCase() : '?'; }

    function getColor(s) {
      const colors = ['#007aff','#ff3b30','#34c759','#ff9500','#af52de','#5ac8fa','#ff2d55','#5856d6'];
      let h = 0; for (let i = 0; i < s.length; i++) h = s.charCodeAt(i) + ((h << 5) - h);
      return colors[Math.abs(h) % colors.length];
    }

    showReg.addEventListener('click', () => { authLogin.classList.add('hidden'); authReg.classList.remove('hidden'); regUser.focus(); });
    showLogin.addEventListener('click', () => { authReg.classList.add('hidden'); authLogin.classList.remove('hidden'); loginUser.focus(); });

    loginBtn.addEventListener('click', doLogin);
    loginPass.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
    regBtn.addEventListener('click', doReg);
    regPass.addEventListener('keydown', e => { if (e.key === 'Enter') doReg(); });

    function doLogin() {
      const user = loginUser.value.trim(); const pass = loginPass.value.trim();
      if (!user || !pass) { loginErr.textContent = 'Заполните все поля'; return; }
      socket.emit('login', { user, pass }, (res) => {
        if (res.ok) { loginErr.textContent = ''; enter(user); }
        else loginErr.textContent = res.err;
      });
    }

    function doReg() {
      const user = regUser.value.trim(); const pass = regPass.value.trim();
      if (!user || !pass) { regErr.textContent = 'Заполните все поля'; return; }
      socket.emit('register', { user, pass }, (res) => {
        if (res.ok) { regErr.textContent = ''; authLogin.classList.remove('hidden'); authReg.classList.add('hidden'); loginUser.value = user; loginPass.value = pass; doLogin(); }
        else regErr.textContent = res.err;
      });
    }

    function enter(user) {
      username = user;
      auth.classList.add('hidden');
      socket.emit('join', { username: user, room: 'general' });
      renderDmList();
    }

    function renderDmList() {
      dmList.innerHTML = '';
      const all = [{ id: 'general', name: 'Общий чат', isDm: false }, ...users.filter(u => u !== username).map(u => ({ id: u, name: u, isDm: true }))];
      all.forEach(u => {
        const div = document.createElement('div');
        div.className = 'dm-item' + ((u.isDm && currentDm === u.id) || (!u.isDm && !currentDm) ? ' active' : '');
        const isOnline = u.id === 'general' || users.includes(u.id);
        div.innerHTML = `<div class="avatar" style="background:${getColor(u.name)}">${getAvatar(u.name)}</div><div class="info"><div class="name">${u.name}</div><div class="preview">${u.isDm ? 'Личные сообщения' : 'Общий чат'}</div></div>${u.isDm ? `<div class="dot" style="background:${isOnline ? '#34c759' : '#ccc'}"></div>` : ''}`;
        div.addEventListener('click', () => {
          if (u.isDm) { currentDm = u.id; currentRoom = 'dm:' + [username, u.id].sort().join(':'); socket.emit('join-dm', { with: u.id }); }
          else { currentDm = null; currentRoom = 'general'; socket.emit('join', { username, room: 'general' }); }
          chatName.textContent = u.name;
          chatAvatar.textContent = getAvatar(u.name);
          chatAvatar.style.background = getColor(u.name);
          chatStatus.textContent = u.isDm ? (users.includes(u.id) ? 'в сети' : 'не в сети') : 'онлайн';
          msgs.innerHTML = '';
          renderDmList();
        });
        dmList.appendChild(div);
      });
    }

    search.addEventListener('input', () => {
      const q = search.value.toLowerCase();
      document.querySelectorAll('.dm-item').forEach(el => {
        el.style.display = el.textContent.toLowerCase().includes(q) ? '' : 'none';
      });
    });

    sendBtn.addEventListener('click', sendMsg);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') sendMsg(); });
    fileBtn.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', () => {
      const file = fileInput.files[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        if (currentDm) socket.emit('dm', { to: currentDm, text: '', file: e.target.result });
        else socket.emit('msg', { text: '', file: e.target.result });
      };
      reader.readAsDataURL(file);
      fileInput.value = '';
    });

    function sendMsg() {
      const text = input.value.trim();
      if (!text) return;
      if (currentDm) socket.emit('dm', { to: currentDm, text, file: '' });
      else socket.emit('msg', { text, file: '' });
      input.value = '';
    }

    function addMsg(msg, isOwn) {
      const div = document.createElement('div');
      div.className = 'msg' + (msg.user === username ? ' own' : '');
      const time = new Date(msg.time).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
      let fileHtml = '';
      if (msg.file) {
        const isImg = msg.file.startsWith('data:image');
        const isVid = msg.file.startsWith('data:video');
        if (isImg) fileHtml = `<img src="${msg.file}" class="file" onclick="window.open(this.src)">`;
        else if (isVid) fileHtml = `<video src="${msg.file}" class="file" controls></video>`;
        else fileHtml = `<a href="${msg.file}" class="file-link" download>📎 Файл</a>`;
      }
      div.innerHTML = `<div class="bubble">${msg.text ? `<div class="text">${escapeHtml(msg.text)}</div>` : ''}${fileHtml}</div><div class="meta">${msg.user !== username ? msg.user + ' · ' : ''}${time}</div>`;
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
    }

    socket.on('msg', (msg) => { if (!currentDm) addMsg(msg); });
    socket.on('sys', (text) => { if (!currentDm) { const d = document.createElement('div'); d.className = 'sys'; d.textContent = text; msgs.appendChild(d); msgs.scrollTop = msgs.scrollHeight; } });
    socket.on('history', (history) => { msgs.innerHTML = ''; if (history) history.forEach(m => addMsg(m)); });
    socket.on('online', (list) => { users = list; onlineCount.textContent = list.length + ' онлайн'; renderDmList(); });

    socket.on('dm', (data) => {
      if (currentDm === data.room.split(':').find(u => u !== username)) addMsg(data.msg);
      else {
        const parts = data.room.split(':');
        const other = parts.find(u => u !== username);
        if (other) {
          const items = document.querySelectorAll('.dm-item');
          for (const item of items) {
            if (item.textContent.includes(other)) {
              item.querySelector('.preview').textContent = data.msg.text || '📎 Файл';
              break;
            }
          }
        }
      }
    });

    function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
  </script>
</body>
</html>
